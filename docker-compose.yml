version: "3.9"

services:
  # ── PostgreSQL (Metadata DB) ────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dataflow}
      POSTGRES_USER: ${POSTGRES_USER:-dataflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dataflow_secret_change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dataflow}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Demo Kaynak DB (sales_demo) ─────────────────────────────────────────────
  # Bu veritabanı ETL pipeline'ının OKUYACAĞI kaynaktır.
  # Platform içinde "Connection" eklerken host=demo_source_db, port=5432 kullanın.
  demo_source_db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: sales_demo
      POSTGRES_USER: sales_user
      POSTGRES_PASSWORD: sales_pass
    volumes:
      - demo_source_data:/var/lib/postgresql/data
      - ./backend/source_db_seed.sql:/docker-entrypoint-initdb.d/01_seed.sql:ro
    ports:
      - "5433:5432"    # Localhost'tan erişim: localhost:5433
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sales_user -d sales_demo"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Demo Hedef DB (dwh_demo) ────────────────────────────────────────────────
  # Bu veritabanı ETL pipeline'ının YAZACAĞI hedeftir.
  # Platform içinde "Connection" eklerken host=demo_target_db, port=5432 kullanın.
  demo_target_db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: dwh_demo
      POSTGRES_USER: dwh_user
      POSTGRES_PASSWORD: dwh_pass
    volumes:
      - demo_target_data:/var/lib/postgresql/data
      - ./backend/target_db_seed.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    ports:
      - "5434:5432"    # Localhost'tan erişim: localhost:5434
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dwh_user -d dwh_demo"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (Celery Broker + Result Backend) ──────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-dataflow}:${POSTGRES_PASSWORD:-dataflow_secret_change_me}@postgres:5432/${POSTGRES_DB:-dataflow}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-dataflow}:${POSTGRES_PASSWORD:-dataflow_secret_change_me}@postgres:5432/${POSTGRES_DB:-dataflow}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      demo_source_db:
        condition: service_healthy
      demo_target_db:
        condition: service_healthy
    volumes:
      - upload_data:/tmp/dataflow_uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Celery Worker ───────────────────────────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.core.celery_app worker --loglevel=info --queues=etl --concurrency=4
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-dataflow}:${POSTGRES_PASSWORD:-dataflow_secret_change_me}@postgres:5432/${POSTGRES_DB:-dataflow}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-dataflow}:${POSTGRES_PASSWORD:-dataflow_secret_change_me}@postgres:5432/${POSTGRES_DB:-dataflow}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - upload_data:/tmp/dataflow_uploads
    deploy:
      replicas: 2

  # ── Celery Beat (Scheduler) ─────────────────────────────────────────────────
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.core.celery_app beat --loglevel=info
    env_file: .env
    environment:
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-dataflow}:${POSTGRES_PASSWORD:-dataflow_secret_change_me}@postgres:5432/${POSTGRES_DB:-dataflow}
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      backend:
        condition: service_healthy

  # ── Flower (Celery Monitoring) ──────────────────────────────────────────────
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.core.celery_app flower --port=5555
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    ports:
      - "5555:5555"
    depends_on:
      - redis

  # ── Frontend (React via Nginx) ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  upload_data:
  demo_source_data:
  demo_target_data:
